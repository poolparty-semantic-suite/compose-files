services:
  proxy:
    image: nginx:1.29.0
    restart: unless-stopped
    environment:
      SERVER_NAME:
      PROXY_CLIENT_MAX_BODY_SIZE:
      PROXY_SEND_TIMEOUT:
      PROXY_READ_TIMEOUT:
    volumes:
      - ./files/nginx/includes:/etc/nginx/includes
      - "${PROXY_CONFIG_PATH}:/etc/nginx/templates/proxy.conf.template"
    ports:
      - "80:80"
    depends_on:
      - poolparty
      - keycloak

  keycloak:
    image: ontotext/poolparty-keycloak:2.3.0
    environment:
      KC_PROXY_HEADERS:
      KC_HTTP_ENABLED:
      KC_HTTP_RELATIVE_PATH:
      KC_HOSTNAME:
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC:
      KEYCLOAK_ADMIN:
      KEYCLOAK_ADMIN_PASSWORD:
      POOLPARTY_SUPER_ADMIN_PASSWORD:
      POOLPARTY_KEYCLOAK_LOGIN_CLIENTSECRET:
      GRAPHDB_PUBLIC_URL:
    ports:
      - "9000:9000"
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /auth/health/ready HTTP/1.0\r\n\r\n' >&0; grep -q '200'; } 0<>/dev/tcp/localhost/9000"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    command:
      - start-dev
      - --import-realm

  elasticsearch:
    image: ontotext/poolparty-elasticsearch:${ELASTICSEARCH_VERSION}
    environment:
      discovery.type:
      xpack.security.enabled:
      ES_JAVA_TOOL_OPTIONS:
      ELASTIC_PASSWORD:
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    mem_limit: 10g

  graphdb:
    image: ontotext/graphdb:11.3.2
    environment:
      USE_SYSTEM_CA_CERTS: yes
      graphdb__home: /opt/graphdb/home
      graphdb__license__file: /etc/graphdb/graphdb.license
      graphdb__external___url:
    entrypoint:
      - "/__cacert_entrypoint.sh"
    command:
      - "/opt/graphdb/dist/bin/graphdb"
    ports:
      - "7200:7200"
    volumes:
      - "${GRAPHDB_LICENSE}:/etc/graphdb/graphdb.license:ro"
      - graphdb_data:/opt/graphdb/home
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:7200/protocol" ]
      interval: 10s
      timeout: 5s
      retries: 20
    extra_hosts:
      - "${SERVER_NAME}:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy

  poolparty:
    image: ontotext/poolparty:10.2.1
    environment:
      USE_SYSTEM_CA_CERTS: yes
      POOLPARTY_CORS_ALLOWEDORIGINS:
      POOLPARTY_KEYCLOAK_LOGIN_REALM:
      POOLPARTY_KEYCLOAK_ADMIN_REALM:
      POOLPARTY_KEYCLOAK_AUTHURL:
      POOLPARTY_KEYCLOAK_LOGIN_CLIENTID:
      POOLPARTY_KEYCLOAK_LOGIN_CLIENTSECRET:
      POOLPARTY_KEYCLOAK_ADMIN_CLIENTID:
      POOLPARTY_KEYCLOAK_ADMIN_USERNAME:
      POOLPARTY_KEYCLOAK_ADMIN_PASSWORD:
      POOLPARTY_INDEX_TYPE:
      POOLPARTY_INDEX_URL:
      POOLPARTY_INDEX_USERNAME:
      POOLPARTY_INDEX_PASSWORD:
      POOLPARTY_GRAPHDB_URL:
      POOLPARTY_GRAPHDB_USERNAME:
      POOLPARTY_GRAPHDB_PASSWORD:
      POOLPARTY_GRAPHDB_AUTHORIZATIONHEADER:
      PP_HEAP_SIZE:
      _POOLPARTY_ENCRYPTION_PASSWORD:
      _POOLPARTY_URL_BASE_SCHEME:
      _POOLPARTY_URL_BASE_VOCABULARY:
      _POOLPARTY_URL_BASE_USER:
      _POOLPARTY_URL_BASE_CONTEXT:
    ports:
      - "8081:8081"
    volumes:
      - "${POOLPARTY_LICENSE}:/usr/share/poolparty/config/licenses/poolparty.key:ro"
      - poolparty_data:/var/lib/poolparty
    depends_on:
      - elasticsearch
      - keycloak
      - graphdb

volumes:
  keycloak_data:
  graphdb_data:
  elastic_data:
  poolparty_data:
