services:
  proxy:
    image: nginx:1.29.0
    restart: unless-stopped
    environment:
      SERVER_NAME:
      PROXY_CLIENT_MAX_BODY_SIZE:
      PROXY_SEND_TIMEOUT:
      PROXY_READ_TIMEOUT:
    volumes:
      - "${UV_PROXY_CONFIG_PATH}:/etc/nginx/templates/proxy.conf.template"
    ports:
      - "80:80"

  rdf4j:
    image: eclipse/rdf4j-workbench:4.3.15
    restart: unless-stopped
    ports:
      - 8086:8080
    # Uncomment if the PoolParty host's FQDN does not resolve via DNS from
    # this host (needed for SPARQL federation to the PoolParty endpoint).
    #extra_hosts:
    #  - "${POOLPARTY_SERVER_NAME}:${POOLPARTY_HOST_IP}"
    environment:
      APP_LOGGING_LEVEL: INFO
      APP_SERVER: tomcat
    volumes:
      - rdf4j_data:/var/rdf4j
      - rdf4j_logs:/usr/local/${APP_SERVER:-tomcat}/logs

  unified-views:
    image: ontotext/unifiedviews:10.2.3
    restart: unless-stopped
    depends_on:
      - rdf4j
    ports:
      - 8085:8080
    # Uncomment if the PoolParty host's FQDN does not resolve via DNS from
    # this host. Set POOLPARTY_SERVER_NAME and POOLPARTY_HOST_IP in .env.
    #extra_hosts:
    #  - "${POOLPARTY_SERVER_NAME}:${POOLPARTY_HOST_IP}"
    environment:
      LICENSE_DIR: /unified-views/license/
    #  PROPERTIES_FILE: /unified-views/configs/uv.properties
    volumes:
      - uv_data:/unified-views
      - "${UNIFIEDVIEWS_LICENSE}:/unified-views/license/uv-license.key:ro"
    # - ./my-custom-uv.properties:/unified-views/configs/uv.properties

volumes:
  rdf4j_data:
  rdf4j_logs:
  uv_data:
